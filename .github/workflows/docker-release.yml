name: Docker Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}

jobs:
  build-and-push:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64, docker, prod]
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - build_features: ""
            tag_prefix: ""
            cache_suffix: base
          - build_features: celestia
            tag_prefix: "celestia-"
            cache_suffix: celestia
          - build_features: eigen
            tag_prefix: "eigen-"
            cache_suffix: eigen

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ matrix.tag_prefix }}${{ steps.vars.outputs.sha_short }}
          build-args: |
            CARGO_BUILD_JOBS=16
            BUILD_FEATURES=${{ matrix.build_features }}
            BUILD_CACHE_SUFFIX=${{ matrix.cache_suffix }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE }}:buildcache-${{ matrix.cache_suffix }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE }}:buildcache-${{ matrix.cache_suffix }},mode=max
